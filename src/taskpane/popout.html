<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grant Gni — Reader</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0D9488; --primary-hover: #0F766E;
      --bg: #F1F5F9; --surface: #FFFFFF; --text: #1E293B;
      --text-secondary: #64748B; --border: #E2E8F0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Inter', "Segoe UI", sans-serif; font-size: 15px;
      line-height: 1.65; color: var(--text); background: var(--bg);
    }
    header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    header strong { font-size: 1rem; }
    main { max-width: 820px; margin: 0 auto; padding: 24px; }
    .review-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 4px solid var(--primary); border-radius: 10px;
      padding: 18px 22px; margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.08);
    }
    .review-issue { font-weight: 600; font-size: 1.02rem; margin-bottom: 8px; }
    .review-suggestion { margin-bottom: 10px; }
    .review-rationale { font-size: 0.88rem; color: var(--text-secondary); }
    #status { color: var(--text-secondary); text-align: center; padding: 40px 20px; }
    button {
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      background: var(--surface); color: var(--text);
      border: 1px solid #CBD5E1; border-radius: 8px; padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: #F8FAFC; border-color: var(--primary); color: var(--primary-hover); }
  </style>
</head>
<body>
  <header>
    <strong id="popout-title">Review suggestions</strong>
    <button id="copy-btn" title="Copy all text">Copy</button>
  </header>
  <main>
    <div id="status">Loading…</div>
    <div id="content"></div>
  </main>

  <script>
    /* Content arrives two ways (belt and braces):
       1. Office dialog messaging: parent calls dialog.messageChild(json).
       2. localStorage fallback: parent stashed the payload just before opening
          (works when the dialog shares the task pane's origin storage). */
    let rendered = false;

    function render(payload) {
      if (rendered || !payload) return;
      rendered = true;
      document.getElementById("status").style.display = "none";
      if (payload.title) document.getElementById("popout-title").textContent = payload.title;
      // The payload HTML is generated by the add-in itself from escaped values.
      document.getElementById("content").innerHTML = payload.html || "";
    }

    function tryLocalStorage() {
      if (rendered) return;
      try {
        const raw = localStorage.getItem("grantGniPopoutContent");
        if (raw) {
          const payload = JSON.parse(raw);
          // Ignore stale payloads (> 10 minutes old).
          if (!payload.ts || Date.now() - payload.ts < 10 * 60 * 1000) render(payload);
        }
      } catch (e) { /* storage unavailable in this host */ }
      if (!rendered) {
        document.getElementById("status").textContent =
          "Could not receive the content in this window. Close it and use the Copy button in the task pane instead.";
      }
    }

    document.getElementById("copy-btn").onclick = () => {
      const text = document.getElementById("content").innerText;
      if (navigator.clipboard) navigator.clipboard.writeText(text);
    };

    if (typeof Office !== "undefined") {
      Office.onReady(() => {
        try {
          Office.context.ui.addHandlerAsync(
            Office.EventType.DialogParentMessageReceived,
            (arg) => { try { render(JSON.parse(arg.message)); } catch (e) { /* ignore */ } },
            () => { try { Office.context.ui.messageParent("popout-ready"); } catch (e) { /* ignore */ } }
          );
        } catch (e) { /* dialog messaging unsupported */ }
        setTimeout(tryLocalStorage, 1200); // fallback if no message arrives
      });
    } else {
      setTimeout(tryLocalStorage, 300);
    }
  </script>
</body>
</html>
